name: CI

# Run the csi_synth test suite on pushes and PRs. Two flavours:
#   * test        — no torch: the C3 BiLSTM test skips (importorskip), everything else runs
#   * test-torch  — installs CPU torch so the <1M-param BiLSTM test actually runs
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: csi_synth

env:
  MPLBACKEND: Agg          # headless matplotlib (plot scripts / analysis imports)

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest tests/ -v

  test-optional:
    name: pytest + optional deps (torch BiLSTM, CSIKit real-data)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies (with CPU torch + CSIKit)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install csikit
      - name: Run tests (BiLSTM + real-data tests included)
        run: python -m pytest tests/ -v
